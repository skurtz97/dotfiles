[general]
# Mathematically prioritize the game's CPU threads over your background AI servers
renice=10
ioprio=0

[custom]
# The exact second you launch a game, switch tuned to accelerator mode
start=sudo tuned-adm profile accelerator-performance
# Optional: Send a GNOME notification so you know it worked
start=notify-send "GameMode Active" "Hardware optimized for RX 9070 XT"

# The exact second you exit the game, restore the server baseline
end=sudo tuned-adm profile throughput-performance
end=notify-send "GameMode Deactivated" "Restored background server baseline"